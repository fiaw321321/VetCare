<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AS8_Thanakorn Pranpanas_68082768{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      background: #ffffff;
      min-height: 100vh;
      color: #212529;
    }
    .container-flex {
      flex: 1;
    }
    .navbar {
      background: #212529 !important;
      backdrop-filter: blur(10px);
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .btn {
      border-radius: 25px;
      padding: 10px 30px;
    }
    .position-relative img {
      border-radius: 15px;
    }

    .form-field {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .form-field label {
      min-width: 120px;
      margin-bottom: 0;
    }

    .two-layer {
      color: #ffffff;
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.8),
        0 0 12px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand fw-bold">ICT12367 SPU Thanakorn Pranpanas</span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a href="{% url 'index' %}" class="nav-link">หน้าแรก</a>
        </li>
        <li class="nav-item">
          <a href="{% url 'form' %}" class="nav-link">ลงทะเบียน</a>
        </li>
        <li class="nav-item">
          <a href="{% url 'results' %}" class="nav-link">ผลการบันทึก</a>
        </li>
        <li class="nav-item">
          <a href="{% url 'about' %}" class="nav-link">เกี่ยวกับเรา</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 container-flex">
  {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
  © 2024 ICT12367 SPU | Information Technology
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
