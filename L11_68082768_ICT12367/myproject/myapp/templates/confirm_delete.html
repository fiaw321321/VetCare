{% extends "base.html" %}

{% block title %}ยืนยันการลบ | AS8_Thanakorn Pranpanas_68082768{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header bg-danger text-white text-center">
        <h4 class="mb-0">ยืนยันการลบข้อมูล</h4>
      </div>
      <div class="card-body">
        <p class="lead">คุณต้องการลบรายการ "<strong>{{ person.name }}</strong>" หรือไม่?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-between">
            <a href="{% url 'results' %}" class="btn btn-secondary">ยกเลิก</a>
            <button type="submit" class="btn btn-danger">ลบทันที</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
